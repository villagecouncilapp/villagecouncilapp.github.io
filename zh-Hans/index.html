  <style>
    :root {
      --paper: #F4E9D4;
      --ink: #3B2F2A;
      --terracotta: #D9694A;
      --teal: #5E9E8F;
      --surface: #FBF4E3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Nunito', system-ui, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      font-weight: 700;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      padding: 40px 20px 56px;
    }
    main { width: 100%; max-width: 680px; text-align: center; }

    .langs { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 22px; font-weight: 800; font-size: 13px; }
    .langs a { color: #9b8a7d; text-decoration: none; padding: 0 10px; border-right: 1px solid #d8c9b0; }
    .langs a:last-child { border-right: none; }
    .langs a.active, .langs a:hover { color: var(--ink); }

    h1 {
      font-family: 'Fredoka', "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      font-weight: 700;
      font-size: clamp(40px, 9vw, 62px);
      letter-spacing: 2px;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .tagline {
      font-size: clamp(15px, 4vw, 19px);
      color: #6b5a4f;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    .council {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 38px;
    }
    .council img {
      width: 84px;
      height: 84px;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
      background: var(--surface);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .cta {
      display: inline-block;
      font-family: 'Fredoka', "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: #fff;
      text-decoration: none;
      background: var(--terracotta);
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 16px 34px;
      box-shadow: 5px 5px 0 var(--ink);
      transition: transform .08s ease, box-shadow .08s ease;
    }
    .cta:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    .disclaimer {
      margin-top: 52px;
      background: var(--surface);
      border: 3px solid var(--ink);
      border-radius: 22px;
      box-shadow: 5px 5px 0 var(--ink);
      padding: 24px 26px;
      text-align: left;
    }
    .disclaimer h2 {
      font-family: 'Fredoka', "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .disclaimer p {
      font-size: 14px;
      font-weight: 600;
      color: #6b5a4f;
      line-height: 1.75;
    }

    footer {
      margin-top: 34px;
      font-size: 13px;
      font-weight: 700;
      color: #9b8a7d;
    }
  </style>
</head>
<body>

</body>
</html>
